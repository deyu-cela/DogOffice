<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>狗狗公司 DEMO</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255,255,255,0.9);
      --text: #3d2f25;
      --muted: #7a685a;
      --accent: #ffb347;
      --accent-2: #8fd3ff;
      --ok: #76c67d;
      --warn: #ef8f52;
      --danger: #d75d5d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-rounded, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: radial-gradient(circle at top, #fff9f3 0%, #fff1dc 35%, #f7e6d5 100%);
      color: var(--text);
    }
    button, input, select { font: inherit; }
    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 340px 1fr 320px;
      gap: 16px;
      min-height: 100vh;
    }
    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,248,241,0.88));
      border: 2px solid rgba(90,70,54,0.12);
      border-radius: 24px;
      padding: 16px;
      box-shadow: 0 14px 36px rgba(90,70,54,0.08);
      backdrop-filter: blur(8px);
    }
    h1, h2, h3, p { margin: 0; }
    .title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 10px; }
    .badge { padding: 6px 10px; border-radius: 999px; font-size: 12px; background: linear-gradient(180deg, #fff7dd, #ffe8bf); border: 1px solid rgba(90,70,54,0.08); white-space: nowrap; box-shadow: inset 0 1px 0 rgba(255,255,255,.6); }
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 14px 0; }
    .stat { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.82); border: 1px solid rgba(90,70,54,0.12); }
    .stat .label { font-size: 12px; color: var(--muted); }
    .stat .value { font-size: 24px; font-weight: 800; margin-top: 4px; }
    .meter { height: 10px; background: #eadfce; border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .meter > div { height: 100%; background: linear-gradient(90deg, #ffcf6b, #ff9f43); width: 50%; transition: width .3s ease; }
    .resume-card { margin-top: 14px; padding: 16px; border-radius: 20px; background: linear-gradient(180deg, #fffefc, #fff5e7); border: 2px dashed rgba(90,70,54,0.18); }
    .resume-layout { display: grid; grid-template-columns: 120px 1fr; gap: 14px; align-items: start; }
    .resume-photo {
      width: 120px; height: 150px; border-radius: 18px; overflow: hidden; background: linear-gradient(180deg, #fff7ef, #f4e0c8);
      border: 2px solid rgba(90,70,54,0.12); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }
    .resume-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .resume-photo-fallback { font-size: 56px; }
    .resume-section-title { font-size: 11px; color: var(--muted); letter-spacing: .08em; margin-bottom: 4px; }
    .resume-blurb { margin-top: 8px; padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,.7); border: 1px solid rgba(90,70,54,0.1); font-size: 13px; color: var(--muted); line-height: 1.5; }
    .dog-hero { font-size: 52px; text-align: center; margin-bottom: 8px; }
    .traits { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    .trait { font-size: 12px; padding: 6px 10px; border-radius: 999px; background: #fff; border: 1px solid rgba(90,70,54,0.12); }
    .effect-list { margin-top: 10px; padding-left: 18px; color: var(--muted); font-size: 14px; line-height: 1.5; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    button { border: 0; border-radius: 14px; padding: 12px 14px; font-size: 15px; font-weight: 800; cursor: pointer; color: var(--text); transition: transform .08s ease, opacity .2s ease; box-shadow: 0 6px 14px rgba(90,70,54,0.08); }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .hire { background: linear-gradient(180deg, #b6efab, #8ee28f); }
    .reject { background: linear-gradient(180deg, #ffdba5, #ffbf73); }
    .mini { background: linear-gradient(180deg, #dcecff, #c6deff); }
    .capacity-warn { color: #ef5350; font-size: 13px; font-weight: 700; margin-top: 8px; text-align: center; }
    .day-timer { margin-top: 10px; }
    .day-timer .dt-bar { height: 8px; background: #eadfce; border-radius: 999px; overflow: hidden; }
    .day-timer .dt-fill { height: 100%; background: linear-gradient(90deg, #a8d8a8, #66bb6a); border-radius: 999px; width: 0; }
    .day-timer .dt-label { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); margin-top: 6px; gap: 8px; }
    .patience-tag { display: inline-block; font-size: 12px; padding: 3px 8px; border-radius: 999px; margin-top: 6px; }
    .patience-ok { background: #e8f5e9; color: #388e3c; }
    .patience-low { background: #fff3e0; color: #e65100; }
    .patience-urgent { background: #ffebee; color: #c62828; animation: pulse 0.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .speed-controls { display: flex; gap: 6px; }
    .speed-controls button { padding: 6px 12px; font-size: 12px; border-radius: 10px; font-weight: 700; }
    .speed-active { background: #ffb347 !important; color: white; }
    .office {
      position: relative;
      min-height: 700px;
      overflow: hidden;
      border-radius: 24px;
      border: 2px solid rgba(90,70,54,0.12);
      display: flex;
      flex-direction: column;
      padding: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.35), rgba(255,255,255,0.15));
    }
    .office-header {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
      background: rgba(255,255,255,0.56);
      border-bottom: 1px solid rgba(90,70,54,0.08);
      flex-shrink: 0;
    }
    .office-header .oh-left { display: flex; align-items: center; gap: 10px; }
    .company-status { padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,0.8); font-weight: 700; font-size: 13px; }
    .capacity-label { font-size: 12px; color: var(--muted); margin-left: 8px; }
    .room { flex: 1; position: relative; overflow: hidden; }
    .room-wall { position: absolute; top: 0; left: 0; right: 0; height: 55%; transition: background 0.5s ease; }
    .room-floor { position: absolute; bottom: 0; left: 0; right: 0; height: 45%; transition: background 0.5s ease; border-top: 3px solid rgba(90,70,54,0.12); }
    .room-window {
      position: absolute; width: 66px; height: 50px; border: 3px solid rgba(90,70,54,0.15);
      border-radius: 8px; background: linear-gradient(180deg, #c8e6ff, #e8f4ff); top: 22px;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.5);
    }
    .room-window::before, .room-window::after {
      content: ""; position: absolute; background: rgba(90,70,54,0.15);
    }
    .room-window::before { width: 4px; height: 100%; left: 50%; transform: translateX(-50%); }
    .room-window::after { height: 4px; width: 100%; top: 50%; transform: translateY(-50%); }
    .desk-obj {
      position: absolute; width: 64px; height: 38px; background: linear-gradient(180deg, #d8b48a, #c99c6b);
      border: 2px solid rgba(90,70,54,0.18); border-radius: 10px;
      box-shadow: 0 10px 12px rgba(90,70,54,0.08);
    }
    .desk-obj::after { content: "💻"; position: absolute; top: 5px; left: 18px; font-size: 18px; }
    .desk-obj::before { content: ""; position: absolute; width: 10px; height: 18px; left: 8px; bottom: -14px; background: #9e7b53; border-radius: 0 0 4px 4px; box-shadow: 38px 0 0 #9e7b53; }
    .shelf {
      position: absolute; width: 84px; height: 18px; background: #b98857; border-radius: 8px;
      border: 2px solid rgba(90,70,54,0.18);
    }
    .shelf::after { content: "📚 🏆"; position: absolute; left: 10px; top: -18px; font-size: 18px; }
    .plant { position: absolute; font-size: 28px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15)); }
    .coffee { position: absolute; font-size: 18px; }
    .door {
      position: absolute; left: 14px; bottom: 0; width: 48px; height: 80px;
      background: #a67c52; border: 2px solid rgba(90,70,54,0.25); border-radius: 8px 8px 0 0; z-index: 3;
    }
    .door::after {
      content: ""; position: absolute; right: 8px; top: 38px; width: 6px; height: 6px; background: #f0c040; border-radius: 50%; }
    .door-label { position: absolute; left: 8px; bottom: 84px; font-size: 11px; color: var(--muted); z-index: 3; white-space: nowrap; }
    .candidate-at-door { position: absolute; left: 64px; z-index: 4; text-align: center; transition: opacity 0.3s; }
    .candidate-at-door .cad-emoji { font-size: 40px; display: block; animation: bob 1.5s ease-in-out infinite; }
    .candidate-at-door .cad-bubble {
      background: white; border: 1.5px solid rgba(90,70,54,0.15); border-radius: 12px; padding: 4px 10px; font-size: 11px;
      margin-top: 2px; white-space: nowrap; position: relative;
    }
    .candidate-at-door .cad-bubble::before {
      content: ""; position: absolute; bottom: -6px; left: 16px;
      border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid white;
    }
    .walking-dog { position: absolute; font-size: 36px; z-index: 2; transition: none; will-change: transform; }
    .walking-avatar {
      width: 52px; height: 52px; border-radius: 16px; overflow: hidden; border: 2px solid rgba(255,255,255,0.75);
      box-shadow: 0 8px 16px rgba(90,70,54,0.14); background: rgba(255,255,255,0.85);
    }
    .walking-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .walking-avatar-fallback { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
    .walking-dog .wd-name {
      position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: var(--muted); white-space: nowrap; background: rgba(255,255,255,0.72); padding: 1px 6px; border-radius: 6px;
    }
    .walking-dog .wd-status { position: absolute; top: -10px; right: -8px; font-size: 14px; }
    .deco { position: absolute; font-size: 20px; z-index: 1; opacity: 0.8; }
    .office-banner {
      position: absolute; right: 18px; top: 18px; z-index: 3;
      background: rgba(255,255,255,0.72); border: 1px solid rgba(90,70,54,0.12);
      border-radius: 12px; padding: 6px 10px; font-size: 12px; color: var(--muted);
    }
    .log { margin-top: 14px; display: flex; flex-direction: column-reverse; gap: 8px; max-height: 220px; overflow: auto; }
    .log-item { background: rgba(255,255,255,0.75); border: 1px solid rgba(90,70,54,0.12); border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--muted); }
    .shop-list, .staff-list { display: grid; gap: 10px; margin-top: 12px; }
    .shop-item, .staff-item { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.78); border: 1px solid rgba(90,70,54,0.12); }
    .staff-actions { display: flex; gap: 8px; margin-top: 10px; }
    .staff-actions button { flex: 1; padding: 8px 10px; font-size: 13px; border-radius: 10px; }
    .staff-tag { display: inline-block; margin-top: 8px; font-size: 11px; padding: 4px 8px; border-radius: 999px; background: #eef4ff; color: #4c5b7a; }
    .staff-tag.pip { background: #fff3e0; color: #e65100; }
    .staff-tag.ready-exit { background: #ffebee; color: #c62828; }
    .shop-top, .staff-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 6px; }
    .small { font-size: 12px; color: var(--muted); line-height: 1.45; }
    .hint-box {
      margin-top: 10px; padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.74);
      border: 1px solid rgba(90,70,54,0.1); font-size: 12px; color: var(--muted);
    }
    .splash-screen {
      position: fixed; inset: 0; z-index: 120; display: flex; align-items: center; justify-content: center; padding: 0;
      background: url('assets/start-screen.png') center/cover no-repeat;
    }
    .splash-card { width: 100%; height: 100%; overflow: hidden; position: relative; }
    .splash-art { position: absolute; inset: 0; }
    .splash-fallback {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.9), transparent 28%), radial-gradient(circle at 70% 16%, rgba(255,236,214,.9), transparent 24%), linear-gradient(180deg, #fff8f2, #ffe5d0);
    }
    .splash-bubbles span {
      position: absolute; border-radius: 999px; background: rgba(255,255,255,0.38); box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
      animation: floatBubble 4.8s ease-in-out infinite;
    }
    .splash-bubbles span:nth-child(1) { width: 88px; height: 88px; left: 8%; top: 14%; }
    .splash-bubbles span:nth-child(2) { width: 44px; height: 44px; right: 14%; top: 20%; animation-delay: .6s; }
    .splash-bubbles span:nth-child(3) { width: 58px; height: 58px; left: 16%; bottom: 18%; animation-delay: 1.1s; }
    .splash-bubbles span:nth-child(4) { width: 112px; height: 112px; right: 10%; bottom: 12%; animation-delay: .9s; }
    .splash-content {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; text-align: center; padding: 44px 24px 54px;
      background: linear-gradient(180deg, transparent 40%, rgba(255,245,235,0.7) 70%, rgba(255,240,225,0.9) 100%);
    }
    .splash-title { font-size: clamp(34px, 6vw, 60px); font-weight: 900; color: #5b3c2b; text-shadow: 0 3px 12px rgba(255,255,255,.45); }
    .splash-sub { margin-top: 10px; color: #7b6153; font-size: 15px; max-width: 560px; line-height: 1.6; }
    .start-btn {
      margin-top: 24px; min-width: 220px; padding: 18px 28px; border-radius: 999px; border: 0; cursor: pointer; font-size: 24px; font-weight: 900;
      color: #6b3f2f; background: linear-gradient(180deg, #ffffff, #ffe1f1 32%, #ffc7e7 100%);
      box-shadow: 0 18px 32px rgba(255,161,203,.34), inset 0 3px 0 rgba(255,255,255,.9), inset 0 -6px 0 rgba(242,149,198,.5);
      position: relative;
    }
    .start-btn::before, .start-btn::after {
      content: ''; position: absolute; border-radius: 999px; background: rgba(255,255,255,.6);
    }
    .start-btn::before { width: 44px; height: 16px; left: 24px; top: 10px; transform: rotate(-8deg); }
    .start-btn::after { width: 20px; height: 20px; right: 28px; top: 12px; }
    .start-btn:hover { transform: translateY(-2px) scale(1.02); }
    .start-btn:active { transform: translateY(1px) scale(.99); }
    @keyframes floatBubble { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .overlay {
      position: fixed; inset: 0; background: rgba(32, 23, 18, 0.55); display: flex; align-items: flex-start; justify-content: center;
      padding: 16px; z-index: 50; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    .overlay-card {
      width: min(760px, 96vw); background: #fffaf3; border-radius: 22px; border: 2px solid rgba(90,70,54,0.15);
      box-shadow: 0 24px 60px rgba(0,0,0,0.22); padding: 18px; margin: auto 0;
    }
    .overlay-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .overlay-close { background: #f3e3cf; padding: 10px 12px; }
    .mini-game-wrap { display: grid; gap: 14px; }
    .frisbee-game {
      position: relative; height: 360px; border-radius: 20px; overflow: hidden;
      background: linear-gradient(180deg, #d8f0ff 0%, #f5fcff 46%, #bee4a1 46%, #91c96d 100%);
      border: 2px solid rgba(90,70,54,0.12);
    }
    .frisbee-dog { position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); font-size: 54px; }
    .frisbee-disk { position: absolute; font-size: 30px; filter: drop-shadow(0 6px 4px rgba(0,0,0,0.12)); }
    .frisbee-hud { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); }
    .quiz-list { display: grid; gap: 12px; margin-top: 12px; }
    .quiz-card {
      border: 1px solid rgba(90,70,54,0.12); border-radius: 14px; padding: 12px; background: rgba(255,255,255,0.8);
    }
    .quiz-options { display: grid; gap: 8px; margin-top: 10px; }
    .quiz-options button { text-align: left; font-weight: 700; background: #f4ede4; }
    .quiz-options button.correct { background: #c9efca; }
    .quiz-options button.wrong { background: #ffd5d5; }
    .result-box {
      padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.84); border: 1px solid rgba(90,70,54,0.12);
      display: grid; gap: 8px;
    }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    /* === Tabs for right panel === */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab-btn { flex: 1; padding: 8px 6px; font-size: 13px; font-weight: 800; border-radius: 12px 12px 0 0; background: rgba(255,255,255,0.4); border: 1px solid rgba(90,70,54,0.08); border-bottom: none; cursor: pointer; text-align: center; transition: background .15s; }
    .tab-btn.active { background: rgba(255,255,255,0.9); box-shadow: 0 -2px 8px rgba(90,70,54,0.06); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* === Chemistry toast === */
    .chem-toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 200;
      background: linear-gradient(135deg, #fff8e1, #ffe0b2); border: 2px solid #ffb347;
      border-radius: 18px; padding: 14px 24px; font-size: 14px; font-weight: 700;
      box-shadow: 0 12px 32px rgba(255,179,71,0.3); animation: toastIn .4s ease-out;
      max-width: 400px; text-align: center;
    }
    .chem-toast.negative { background: linear-gradient(135deg, #ffebee, #ffcdd2); border-color: #ef5350; box-shadow: 0 12px 32px rgba(239,83,80,0.2); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* === Memory game === */
    .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; max-width: 420px; margin-left: auto; margin-right: auto; }
    .memory-card {
      width: 100%; height: 80px; border-radius: 14px; font-size: 28px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform .2s, background .2s; border: 2px solid rgba(90,70,54,0.15);
      background: linear-gradient(135deg, #e8d5c4, #d4bfa8); user-select: none;
    }
    .memory-card.flipped, .memory-card.matched { background: linear-gradient(135deg, #fff8ef, #fff1dc); transform: scale(1.02); }
    .memory-card.matched { border-color: var(--ok); opacity: 0.7; }

    /* === Radar chart === */
    .radar-wrap { display: flex; justify-content: center; margin: 12px 0; }

    /* === Bankruptcy screen === */
    .bankrupt-screen {
      position: fixed; inset: 0; z-index: 150; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(180deg, #4a3728, #2a1a10); color: #fff; text-align: center; padding: 32px;
    }
    .bankrupt-dog { font-size: 120px; animation: cry 1.2s ease-in-out infinite; }
    @keyframes cry { 0%,100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-8px) rotate(-3deg); } 75% { transform: translateY(-4px) rotate(3deg); } }
    .bankrupt-title { font-size: 36px; font-weight: 900; margin-top: 20px; color: #ffb347; }
    .bankrupt-sub { font-size: 16px; color: #d4bfa8; margin-top: 12px; max-width: 400px; line-height: 1.6; }
    .bankrupt-score { margin-top: 16px; font-size: 20px; font-weight: 800; color: #ffd4a0; }
    .bankrupt-tears { position: absolute; pointer-events: none; }
    .tear { position: absolute; width: 8px; height: 14px; background: #88ccff; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; opacity: 0; animation: tearDrop 2s ease-in infinite; }
    .tear:nth-child(2) { animation-delay: .7s; left: 30px; }
    .tear:nth-child(3) { animation-delay: 1.4s; left: 60px; }
    @keyframes tearDrop { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(80px); } }

    /* === Interview Q on resume === */
    .interview-q { margin-top: 10px; padding: 10px 12px; border-radius: 12px; background: #fff3e0; border: 1px solid rgba(255,179,71,0.3); }
    .interview-q .iq-label { font-size: 11px; color: var(--warn); font-weight: 800; margin-bottom: 4px; }
    .interview-q .iq-text { font-size: 13px; color: var(--text); font-weight: 700; }
    .interview-q .iq-answer { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

    /* === Vacancy === */
    .vacancy-card { text-align: center; padding: 24px 16px; }
    .vacancy-card .vc-emoji { font-size: 48px; animation: floatBubble 3s ease-in-out infinite; }

    /* === Shop stat tags === */
    .shop-stat-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .shop-stat-tag { font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 700; }
    .shop-stat-tag.up { background: #e8f5e9; color: #388e3c; }
    .shop-stat-tag.down { background: #ffebee; color: #c62828; }

    /* === CEO special === */

      { id:'artwall', name:'品牌展示牆', cost:88, desc:'讓辦公室更有風格，也能帶來話題。', statTags:[{label:'裝飾+2',type:'up'},{label:'士氣+4',type:'up'},{label:'產能+1',type:'up'}], effect: s => { s.decor += 2; s.morale += 4; s.productivityBoost += 1; log('展示牆完成，整體氣氛更像新創公司了。'); } },
      { id:'coffee', name:'精品咖啡機', cost:56, desc:'提神醒腦！產能與士氣都微幅提升。', statTags:[{label:'產能+1',type:'up'},{label:'士氣+5',type:'up'}], effect: s => { s.productivityBoost += 1; s.morale += 5; log('咖啡機上線了，效率跟心情都變好。'); } },
      { id:'gym', name:'狗狗健身區', cost:95, desc:'強身健體，穩定度大幅提升。', statTags:[{label:'穩定+2',type:'up'},{label:'士氣+6',type:'up'},{label:'營運+3',type:'up'}], effect: s => { s.stabilityBoost += 2; s.morale += 6; s.health += 3; log('健身區開放了，狗狗們精神抖擻！'); } },
    ];

    /* ═══════════════════════════════════════════════════════
       6. GAME STATE
    ═══════════════════════════════════════════════════════ */
    const BASE_DAY_MS = 7000;
    let speedMultiplier = 1;
    let dayElapsed = 0;
    let lastTick = performance.now();

    const state = {
      day: 1,
      money: 300,
      morale: 58,
      health: 55,
      decor: 1,
      productivityBoost: 0,
      stabilityBoost: 0,
      trainingBoost: 0,
      officeLevel: 0,
      staff: [],
      staffActionModal: null,
      queue: [],
      current: null,
      candidatePatience: 0,
      log: ['狗狗公司在車庫成立了！時間會自動流逝，趕快做決定！'],
      miniGame: null,
      trainingSession: null,
      candidateReaction: null,
      showSplash: true,
      tutorialStep: 0, // 0=not started, 1-6=steps, 7=done
      vacancy: false,
      vacancyTimer: 0,
      activeChemistry: [],
      bankrupt: false,
      activeTab: 'shop',
    };

    const walkers = [];

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function textLevel(v, labels) { return v >= 75 ? labels[0] : v >= 45 ? labels[1] : labels[2]; }
    function currentLevel() { return OFFICE_LEVELS[state.officeLevel]; }
    function maxStaff() { return currentLevel().maxStaff; }
    function atCapacity() { return state.staff.length >= maxStaff(); }
    function companyStage() {
      const score = state.health + state.morale + state.staff.length * 4 + state.decor * 5;
      if (score >= 180) return '蓬勃成長';
      if (score >= 120) return '穩定營運';
      if (score >= 80) return '勉強撐住';
      return '快撐不住';
    }
    function companyHint() {
      if (state.money < 60) return '資金偏低，先穩住現金流再擴編。';
      if (state.health < 40) return '營運有點亂，先補穩定度比盲目賺錢重要。';
      if (state.morale < 40) return '大家看起來累了，陪玩或補零食比較有感。';
      return '目前公司節奏還可以，找對人比亂堆數值更重要。';
    }

    /* ═══════════════════════════════════════════════════════
       7. CANDIDATE GENERATION (with differentiation & vacancy)
    ═══════════════════════════════════════════════════════ */
    function generateCandidate() {
      // CEO 彩蛋
      if (Math.random() < CEO_CHANCE) {
        const base = structuredClone(CEO_DOG);
        base.name = rand(base.names);
        base.stats = { ...base.baseStats };
        base.image = ROLE_IMAGE_MAP['CEO'] || '';
        base.expectedSalary = 25 + Math.floor(Math.random() * 10);
        base.patience = 1; // CEO 不等人
        base.note = '⭐ 超級稀有！傳說中的狗界 CEO 降臨了！';
        base.interviewQ = rand(INTERVIEW_QUESTIONS);
        base.grade = 'S';
        return base;
      }

      const template = structuredClone(rand(DOG_ROLES));
      template.name = rand(template.names);

      // 同職業差別化：隨機調整 stats（A/B/C 等級）
      const gradeRoll = Math.random();
      let grade, statMod;
      if (gradeRoll < 0.15) { grade = 'A'; statMod = 2; }      // 15% 優秀
      else if (gradeRoll < 0.55) { grade = 'B'; statMod = 0; }  // 40% 普通
      else if (gradeRoll < 0.85) { grade = 'C'; statMod = -1; } // 30% 稍差
      else { grade = 'D'; statMod = -2; }                        // 15% 差

      const stats = { ...template.baseStats };
      const keys = Object.keys(stats);
      // 隨機加減，讓同職業有不同面貌
      for (const k of keys) {
        stats[k] = Math.max(-3, stats[k] + statMod + Math.floor(Math.random() * 3) - 1);
      }
      template.stats = stats;
      template.grade = grade;

      const score = stats.productivity + stats.morale + stats.stability + stats.revenue;
      template.image = ROLE_IMAGE_MAP[template.role] || '';
      template.expectedSalary = Math.max(5, 8 + Math.max(0, score) + (grade === 'A' ? 4 : grade === 'D' ? -3 : 0));
      template.patience = 2 + Math.floor(Math.random() * 3);
      template.note = grade === 'A' ? '✨ 看起來非常優秀的人才！' : grade === 'B' ? '能力還行，要看公司缺什麼。' : grade === 'C' ? '有待觀察，但也許有潛力。' : '⚠️ 能力偏弱，錄用風險較高。';
      template.interviewQ = rand(INTERVIEW_QUESTIONS);
      return template;
    }

    function ensureQueue() {
      while (state.queue.length < 3) state.queue.push(generateCandidate());
      if (!state.current && !state.vacancy) {
        // 空窗期機制：15% 機率觸發
        if (Math.random() < 0.15 && state.day > 2) {
          state.vacancy = true;
          state.vacancyTimer = 1 + Math.floor(Math.random() * 2); // 1-2 天空窗
        } else {
          state.current = state.queue.shift();
          state.candidatePatience = state.current.patience;
        }
      }
    }

    function log(msg) {
      state.log.push(`Day ${state.day} · ${msg}`);
      if (state.log.length > 18) state.log = state.log.slice(-18);
      renderLog();
    }

    /* ═══════════════════════════════════════════════════════
       8. CHEMISTRY CHECK
    ═══════════════════════════════════════════════════════ */
    function checkChemistry(newDog) {
      const existingRoles = new Set(state.staff.map(d => d.role));
      for (const combo of CHEMISTRY_COMBOS) {
        const [r1, r2] = combo.roles;
        if ((newDog.role === r1 && existingRoles.has(r2)) || (newDog.role === r2 && existingRoles.has(r1))) {
          // 避免重複觸發
          const key = combo.roles.sort().join('+');
          if (!state.activeChemistry.includes(key)) {
            state.activeChemistry.push(key);
            showChemToast(combo);
            // 套用加成
            if (combo.bonus.morale) state.morale = clamp(state.morale + combo.bonus.morale, 0, 100);
            if (combo.bonus.stability) state.health = clamp(state.health + combo.bonus.stability, 0, 100);
            if (combo.bonus.revenue) state.money += combo.bonus.revenue * 5;
            if (combo.bonus.productivity) state.productivityBoost += combo.bonus.productivity;
          }
        }
      }
    }

    function showChemToast(combo) {
      const root = document.getElementById('toastRoot');
      const cls = combo.type === 'negative' ? 'chem-toast negative' : 'chem-toast';
      root.innerHTML = `<div class="${cls}">${combo.msg}</div>`;
      setTimeout(() => { root.innerHTML = ''; }, 4000);
    }

    /* ═══════════════════════════════════════════════════════
       9. RADAR CHART (Canvas 五角圖)
    ═══════════════════════════════════════════════════════ */
    function drawRadar(canvasId, stats) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2, r = Math.min(w, h) / 2 - 30;
      const labels = ['產能', '士氣', '穩定', '收入', '成長'];
      const values = [
        clamp((stats.productivity + 3) / 8, 0, 1),
        clamp((stats.morale + 3) / 8, 0, 1),
        clamp((stats.stability + 3) / 8, 0, 1),
        clamp((stats.revenue + 3) / 8, 0, 1),
        clamp(((stats.productivity + stats.revenue) / 2 + 3) / 8, 0, 1),
      ];
      ctx.clearRect(0, 0, w, h);

      // 畫底圖網格
      for (let level = 1; level <= 4; level++) {
        ctx.beginPath();
        const lr = r * level / 4;
        for (let i = 0; i <= 5; i++) {
          const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
          const x = cx + lr * Math.cos(angle);
          const y = cy + lr * Math.sin(angle);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(90,70,54,0.12)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // 畫數值
      ctx.beginPath();
      for (let i = 0; i <= 5; i++) {
        const idx = i % 5;
        const angle = (Math.PI * 2 / 5) * idx - Math.PI / 2;
        const x = cx + r * values[idx] * Math.cos(angle);
        const y = cy + r * values[idx] * Math.sin(angle);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = 'rgba(255,179,71,0.3)';
      ctx.fill();
      ctx.strokeStyle = '#ffb347';
      ctx.lineWidth = 2.5;
      ctx.stroke();

      // 畫標籤
      ctx.fillStyle = '#5b3c2b';
      ctx.font = 'bold 11px ui-rounded, sans-serif';
      ctx.textAlign = 'center';
      for (let i = 0; i < 5; i++) {
        const angle = (Math.PI * 2 / 5) * i - Math.PI / 2;
        const x = cx + (r + 18) * Math.cos(angle);
        const y = cy + (r + 18) * Math.sin(angle);
        ctx.fillText(labels[i], x, y + 4);
      }
    }

    /* ═══════════════════════════════════════════════════════
       10. WALKERS / OFFICE SCENE
    ═══════════════════════════════════════════════════════ */
    function getRoomBounds() {
      const room = document.getElementById('room');
      if (!room) return { w: 500, h: 400, floorTop: 220 };
      return { w: room.clientWidth, h: room.clientHeight, floorTop: room.clientHeight * 0.55 };
    }
    function addWalker(dogData) {
      const b = getRoomBounds();
      const floorH = b.h - b.floorTop;
      walkers.push({
        x: 70, y: b.floorTop + 20 + Math.random() * (floorH - 70),
        targetX: 100 + Math.random() * (b.w - 180),
        targetY: b.floorTop + 20 + Math.random() * (floorH - 70),
        facingRight: true, speed: 0.35 + Math.random() * 0.45, idleTimer: 0, dogData,
      });
    }
    function pickNewTarget(w) {
      const b = getRoomBounds();
      const floorH = b.h - b.floorTop;
      w.targetX = 80 + Math.random() * (b.w - 160);
      w.targetY = b.floorTop + 20 + Math.random() * (floorH - 70);
      w.idleTimer = 35 + Math.floor(Math.random() * 80);
    }
    function updateWalkers() {
      for (const w of walkers) {
        if (w.idleTimer > 0) { w.idleTimer--; continue; }
        const speedPenalty = state.morale < 35 || state.health < 35 ? 0.55 : 1;
        const dx = w.targetX - w.x, dy = w.targetY - w.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 4) { pickNewTarget(w); continue; }
        w.facingRight = dx > 0;
        w.x += (dx / dist) * w.speed * speedPenalty;
        w.y += (dy / dist) * w.speed * speedPenalty;
      }
    }
    function renderWalkers() {
      const layer = document.getElementById('dogsLayer');
      if (!layer) return;
      const low = state.morale < 40 || state.health < 35;
      const busy = state.morale >= 60 && state.health >= 55;
      const statusEmoji = low ? '💤' : busy ? '✨' : state.health < 45 ? '😵' : '';
      let html = '';
      for (const w of walkers) {
        const flip = w.facingRight ? '' : 'scaleX(-1)';
        const walking = w.idleTimer <= 0;
        const bobStyle = walking ? 'animation:bob 0.6s ease-in-out infinite' : '';
        const image = w.dogData.image || ROLE_IMAGE_MAP[w.dogData.role];
        const avatar = image
          ? `<div class="walking-avatar"><img src="${image}" alt="${w.dogData.role}"></div>`
          : `<div class="walking-avatar-fallback">${w.dogData.emoji}</div>`;
        html += `<div class="walking-dog" style="left:${w.x}px;top:${w.y}px;transform:${flip};${bobStyle}">
          ${avatar}
          <span class="wd-name">${w.dogData.name}</span>
          ${statusEmoji ? `<span class="wd-status">${statusEmoji}</span>` : ''}
        </div>`;
      }
      layer.innerHTML = html;
    }

    function hasOverlayOpen() {
      return !!state.miniGame || !!state.trainingSession || (state.tutorialStep > 0 && state.tutorialStep < 7);
    }

    /* ═══════════════════════════════════════════════════════
       11. GAME LOOP
    ═══════════════════════════════════════════════════════ */
    function gameTick(now) {
      if (state.bankrupt) return;
      const dt = now - lastTick;
      lastTick = now;
      updateWalkers();
      renderWalkers();
      if (!hasOverlayOpen()) dayElapsed += dt * speedMultiplier;
      const dayDuration = BASE_DAY_MS;
      const progress = Math.min(dayElapsed / dayDuration, 1);
      const fill = document.getElementById('dayFill');
      if (fill) fill.style.width = `${progress * 100}%`;
      const timerText = document.getElementById('dayTimerText');
      if (timerText) {
        const remainingMs = Math.max(0, dayDuration - dayElapsed);
        timerText.textContent = hasOverlayOpen() ? '小遊戲進行中，天數暫停' : `下一天 ${(remainingMs / 1000).toFixed(1)}s`;
      }
      if (!hasOverlayOpen() && dayElapsed >= dayDuration) {
        dayElapsed = 0;
        advanceDay();
      }
      requestAnimationFrame(gameTick);
    }
    requestAnimationFrame(gameTick);

    function setSpeed(s) {
      speedMultiplier = s;
      document.getElementById('speed1').classList.toggle('speed-active', s === 1);
      document.getElementById('speed2').classList.toggle('speed-active', s === 2);
      document.getElementById('speed3').classList.toggle('speed-active', s === 3);
    }
    window.setSpeed = setSpeed;

    /* ═══════════════════════════════════════════════════════
       12. DAY ADVANCE (with bankruptcy check)
    ═══════════════════════════════════════════════════════ */
    function advanceDay() {
      const roleCounts = {};
      DOG_ROLES.forEach(r => roleCounts[r.role] = 0);
      roleCounts['CEO'] = 0;
      state.staff.forEach(d => { roleCounts[d.role] = (roleCounts[d.role] || 0) + 1; });

      const revenueBase = state.staff.reduce((s, d) => s + d.stats.revenue, 0) * 4;
      const productivity = state.staff.reduce((s, d) => s + d.stats.productivity, 0) + state.productivityBoost;
      const stability = state.staff.reduce((s, d) => s + d.stats.stability, 0) + state.stabilityBoost;
      const moraleGain = state.staff.reduce((s, d) => s + d.stats.morale, 0);
      const expense = state.staff.reduce((s, d) => s + d.expectedSalary, 0) - (roleCounts['財務'] || 0) * 3;
      const scalePenalty = Math.max(0, state.staff.length - maxStaff()) * 4;
      const noManagerPenalty = roleCounts['主管'] === 0 ? 9 : 0;
      const noOpsPenalty = roleCounts['營運'] === 0 ? 7 : 0;
      const managerMoodBonus = roleCounts['主管'] === 0 ? 3 : 0;
      const marketingBonus = (roleCounts['行銷'] || 0) * 5;
      const artBoost = (roleCounts['美術'] || 0) * Math.max(1, state.decor);
      const translationStability = (roleCounts['翻譯'] || 0) * 3;
      const opsStability = (roleCounts['營運'] || 0) * 4;
      const qaStability = (roleCounts['QA'] || 0) * 3;
      const pmBoost = (roleCounts['PM'] || 0) * 3;
      const ceoBoost = (roleCounts['CEO'] || 0) * 10;
      const operationBonus = Math.round(productivity * 1.5 + (stability + translationStability + opsStability + qaStability + pmBoost) * 1.2 + state.trainingBoost + marketingBonus + artBoost + ceoBoost);
      const income = Math.max(0, revenueBase + operationBonus - scalePenalty - Math.round(noManagerPenalty * 0.4));
      state.money += income - Math.max(0, expense);
      state.health += Math.round((productivity + stability + translationStability + opsStability + qaStability) / 2) - Math.max(0, state.staff.length - 6) * 2 - noManagerPenalty - noOpsPenalty;
      state.morale += moraleGain - Math.max(0, state.staff.length - 5) - (state.money < 40 ? 4 : 0) + managerMoodBonus + Math.min(4, roleCounts['美術'] || 0) + ceoBoost;
      state.morale = clamp(state.morale, 0, 100);
      state.health = clamp(state.health, 0, 100);

      state.day += 1;
      state.trainingBoost = Math.max(0, Math.round(state.trainingBoost * 0.35));

      // PIP 處理
      state.staff.forEach(dog => {
        if (dog.status === 'pip') {
          dog.pipDaysLeft = Math.max(0, dog.pipDaysLeft - 1);
          dog.pipScore += dog.stats.productivity + dog.stats.stability + (dog.stats.morale > 0 ? 1 : 0);
          if (dog.pipDaysLeft === 0) {
            log(`${dog.name} 的 PIP 結束了，可以決定留任或資遣。`);
          }
        }
      });

      if (roleCounts['主管'] === 0 && state.staff.length >= 2) log('公司沒有主管，營運容易混亂。');
      if (roleCounts['營運'] === 0 && state.staff.length >= 3) log('缺少營運狗狗，流程卡卡的。');

      // 破產檢查
      if (state.money <= 0 && state.staff.length > 0 && state.day > 5) {
        state.money = 0;
        state.morale = clamp(state.morale - 15, 0, 100);
        if (state.health <= 10 && state.morale <= 15) {
          triggerBankruptcy();
          return;
        }
        log('⚠️ 資金見底了！再撐不住就要破產了！');
      } else if (state.money <= 0) {
        state.money = 0;
        state.morale = clamp(state.morale - 8, 0, 100);
        log('資金見底了，大家看起來有點不安。');
      }

      // 空窗期處理
      if (state.vacancy) {
        state.vacancyTimer--;
        if (state.vacancyTimer <= 0) {
          state.vacancy = false;
          state.current = state.queue.shift();
          if (state.current) state.candidatePatience = state.current.patience;
          log('新的候選狗狗終於來了！');
        }
      }

      if (state.current) {
        state.candidatePatience--;
        if (state.candidatePatience <= 0) {
          log(`${state.current.name} 等太久了，不耐煩走掉了！`);
          setCandidateReaction('timeout', state.current);
          state.current = null;
          ensureQueue();
        }
      }

      if (state.staff.length > 0) {
        log(`本日結算：收入 $${income}，支出 $${Math.max(0, expense)}，淨變動 $${income - Math.max(0, expense)}`);
      } else {
        log('今天還沒有正式員工，辦公室很安靜。');
      }
      render();
    }

    /* ═══════════════════════════════════════════════════════
       13. BANKRUPTCY
    ═══════════════════════════════════════════════════════ */
    function triggerBankruptcy() {
      state.bankrupt = true;
      document.getElementById('bankruptRoot').innerHTML = `
        <div class="bankrupt-screen">
          <div style="position:relative">
            <div class="bankrupt-dog">🐕</div>
            <div class="bankrupt-tears">
              <div class="tear"></div><div class="tear"></div><div class="tear"></div>
            </div>
          </div>
          <div class="bankrupt-title">公司破產了...</div>
          <div class="bankrupt-sub">狗狗們含著眼淚收拾行李離開了辦公室...<br>也許下次會經營得更好！</div>
          <div class="bankrupt-score">
            撐了 ${state.day} 天｜最多 ${state.staff.length} 位員工<br>
            最終資金 $${state.money}
          </div>
          <button class="start-btn" style="margin-top:24px" onclick="location.reload()">重新開始</button>
        </div>
      `;
    }

    /* ═══════════════════════════════════════════════════════
       14. HIRE / REJECT
    ═══════════════════════════════════════════════════════ */
    function setCandidateReaction(type, dog) {
      const map = {
        hire: { emoji:'🥹💼✨', text:`${dog.name} 開心得尾巴狂搖，立刻抱著 offer 衝進辦公室！` },
        reject: { emoji:'🥺📄', text:`${dog.name} 有點可惜地收起履歷，默默離開了。` },
        timeout: { emoji:'😤', text:`${dog.name} 等太久了，氣呼呼地自己走掉。` },
      };
      state.candidateReaction = map[type] || null;
    }

    function hireCurrent() {
      if (atCapacity() || !state.current) return;
      const dog = state.current;
      dog.status = 'active';
      dog.pipDaysLeft = 0;
      dog.pipScore = 0;
      dog.pipTasks = [];
      dog.severance = Math.max(18, dog.expectedSalary * 2);
      state.staff.push(dog);
      state.money = Math.max(0, state.money - dog.expectedSalary * 2);
      state.morale = clamp(state.morale + dog.stats.morale * 2, 0, 100);
      state.health = clamp(state.health + dog.stats.productivity + Math.max(0, dog.stats.stability), 0, 100);
      setCandidateReaction('hire', dog);
      checkChemistry(dog);

      ensureQueue();
      render();

    function rejectCurrent() {
      if (!state.current) return;
      const dog = state.current;
      setCandidateReaction('reject', dog);
      log(`婉拒了 ${dog.name}，下一位！`);

    // ── Frisbee game (original, polished) ──
    function openPlayMiniGame() {
      if (state.miniGame || state.trainingSession) return;
      // 隨機選遊戲
      const games = ['frisbee', 'memory'];
      const pick = rand(games);
      if (pick === 'memory') { openMemoryGame(); return; }
      state.miniGame = {
        type: 'frisbee', timeLeft: 30, score: 0, treats: [], dogX: 50, spawnTick: 0, running: true, moveDir: 0,
      };
      renderOverlay();
      startFrisbeeLoop();
    }

    function updateFrisbeeDOM() {
      const mg = state.miniGame;
      if (!mg || mg.type !== 'frisbee') return;
      const root = document.getElementById('overlayRoot');
      if (!root) return;
      const timerEl = root.querySelector('.fris-timer');
      const scoreEl = root.querySelector('.fris-score');
      const dogEl = root.querySelector('.frisbee-dog');
      const gameEl = root.querySelector('.frisbee-game');
      if (timerEl) timerEl.textContent = mg.timeLeft.toFixed(1);
      if (scoreEl) scoreEl.textContent = mg.score;
      if (dogEl) dogEl.style.left = mg.dogX + '%';
      // Update treats
      if (gameEl) {
        // Remove old treats
        gameEl.querySelectorAll('.frisbee-disk').forEach(el => el.remove());
        // Add current treats
        for (const item of mg.treats) {
          const el = document.createElement('div');
          el.className = 'frisbee-disk';
          el.style.left = item.x + '%';
          el.style.top = item.y + '%';
          el.textContent = item.emoji;
          gameEl.appendChild(el);
        }
      }
    }

    function startFrisbeeLoop() {
      const mg = state.miniGame;
      if (!mg) return;
      let last = performance.now();
      function step(now) {
        if (!state.miniGame || !state.miniGame.running) return;
        const dt = (now - last) / 1000;
        last = now;
        mg.timeLeft = Math.max(0, mg.timeLeft - dt);
        mg.spawnTick += dt;
        mg.dogX = clamp(mg.dogX + mg.moveDir * dt * 42, 6, 94);
        if (mg.spawnTick > 0.65) {
          mg.spawnTick = 0;
          const emojis = ['🥏','🦴','🍖','🧀','⭐'];
          const e = rand(emojis);
          const pts = e === '⭐' ? 3 : e === '🥏' ? 2 : 1;
          mg.treats.push({ id: Math.random(), x: 10 + Math.random() * 80, y: -8, speed: 18 + Math.random() * 20, emoji: e, pts });
        }
        mg.treats.forEach(item => item.y += item.speed * dt);
        mg.treats = mg.treats.filter(item => {
          const hit = Math.abs(item.x - mg.dogX) < 10 && item.y > 72 && item.y < 90;
          if (hit) mg.score += item.pts;
          return item.y < 104 && !hit;
        });
        updateFrisbeeDOM();
        if (mg.timeLeft <= 0) { finishPlayMiniGame(); return; }
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function moveMiniDog(dir) { if (state.miniGame) { state.miniGame.moveDir = dir; state.miniGame.dogX = clamp(state.miniGame.dogX + dir * 8, 6, 94); } }
    function stopMiniDog() { if (state.miniGame) state.miniGame.moveDir = 0; }
    window.moveMiniDog = moveMiniDog;
    window.stopMiniDog = stopMiniDog;

    function finishPlayMiniGame(endedEarly = false) {
      const mg = state.miniGame;
      if (!mg) return;
      mg.running = false;
      mg.moveDir = 0;
      const moraleGain = 6 + Math.min(14, mg.score);
      state.morale = clamp(state.morale + moraleGain, 0, 100);
      state.money = Math.max(0, state.money - 10);
      log(endedEarly ? `提早結束陪玩，得 ${mg.score} 分，士氣 +${moraleGain}。` : `陪玩結束！得 ${mg.score} 分，士氣 +${moraleGain}。`);
      state.miniGame = null;
      renderOverlay();
      render();
    }

    // ── Memory card game (新增翻牌記憶遊戲) ──
    function openMemoryGame() {
      const emojis = ['🐕','🐩','🐶','🐺','🐾','🦴','🥏','🧀'];
      const cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5).map((e, i) => ({ id: i, emoji: e, flipped: false, matched: false }));
      state.miniGame = {
        type: 'memory', cards, flippedIds: [], matches: 0, moves: 0, running: true, timeLeft: 60,
      };
      renderOverlay();
      startMemoryTimer();
    }

    function startMemoryTimer() {
      const mg = state.miniGame;
      if (!mg || mg.type !== 'memory') return;
      let last = performance.now();
      function step(now) {
        if (!state.miniGame || state.miniGame.type !== 'memory' || !state.miniGame.running) return;
        const dt = (now - last) / 1000;
        last = now;
        state.miniGame.timeLeft = Math.max(0, state.miniGame.timeLeft - dt);
        if (state.miniGame.timeLeft <= 0) { finishMemoryGame(); return; }
        // Only update the timer text, don't re-render the whole overlay
        const root = document.getElementById('overlayRoot');
        const timerEl = root?.querySelector('.mem-timer');
        if (timerEl) timerEl.textContent = state.miniGame.timeLeft.toFixed(1);
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function updateMemoryDOM() {
      const mg = state.miniGame;
      if (!mg || mg.type !== 'memory') return;
      const root = document.getElementById('overlayRoot');
      if (!root) return;
      const cardEls = root.querySelectorAll('.memory-card');
      mg.cards.forEach((c, i) => {
        const el = cardEls[i];
        if (!el) return;
        el.className = 'memory-card' + (c.flipped ? ' flipped' : '') + (c.matched ? ' matched' : '');
        el.textContent = (c.flipped || c.matched) ? c.emoji : '❓';
      });
      const matchesEl = root.querySelector('.mem-matches');
      const movesEl = root.querySelector('.mem-moves');
      if (matchesEl) matchesEl.textContent = mg.matches;
      if (movesEl) movesEl.textContent = mg.moves;
    }

    function flipMemoryCard(id) {
      const mg = state.miniGame;
      if (!mg || mg.type !== 'memory' || !mg.running) return;
      const card = mg.cards.find(c => c.id === id);
      if (!card || card.flipped || card.matched || mg.flippedIds.length >= 2) return;
      card.flipped = true;
      mg.flippedIds.push(id);
      mg.moves++;
      updateMemoryDOM();

      if (mg.flippedIds.length === 2) {
        const [a, b] = mg.flippedIds.map(fid => mg.cards.find(c => c.id === fid));
        if (a.emoji === b.emoji) {
          a.matched = b.matched = true;
          mg.matches++;
          mg.flippedIds = [];
          updateMemoryDOM();
          if (mg.matches >= 8) { setTimeout(() => finishMemoryGame(), 300); }
        } else {
          setTimeout(() => {
            a.flipped = b.flipped = false;
            mg.flippedIds = [];
            updateMemoryDOM();
          }, 800);
        }
      }
    }
    window.flipMemoryCard = flipMemoryCard;

    function finishMemoryGame() {
      const mg = state.miniGame;
      if (!mg) return;
      mg.running = false;
      const bonus = mg.matches >= 8 ? 15 : Math.round(mg.matches * 2);
      const moraleGain = 8 + bonus;
      state.morale = clamp(state.morale + moraleGain, 0, 100);
      state.money = Math.max(0, state.money - 10);
      log(`翻牌遊戲結束！配對 ${mg.matches}/8，${mg.moves} 步，士氣 +${moraleGain}。`);
      state.miniGame = null;
      renderOverlay();
      render();
    }

    function openTrainingQuiz() {
      if (state.trainingSession || state.miniGame || state.staffActionModal) return;
      const questions = [...TRAINING_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, 5);
      state.trainingSession = { questions, index: 0, score: 0, answered: false, selected: null, finished: false, reward: 0 };
      renderOverlay();

    function answerTraining(optionIndex) {
      const ts = state.trainingSession;
      if (!ts || ts.answered || ts.finished) return;
      const q = ts.questions[ts.index];
      ts.selected = optionIndex;
      ts.answered = true;
      if (optionIndex === q.answer) ts.score += q.reward;
      renderOverlay();
    }
    window.answerTraining = answerTraining;

    function nextTrainingQuestion() {
      const ts = state.trainingSession;
      if (!ts) return;
      if (ts.index >= ts.questions.length - 1) {
        const gain = Math.round(ts.score * 0.8);
        const healthGain = Math.max(4, Math.round(ts.score * 0.35));
        state.trainingBoost += gain;
        state.health = clamp(state.health + healthGain, 0, 100);
        state.money = Math.max(0, state.money - 18);
        ts.finished = true;
        ts.reward = gain;
        log(`培訓完成，問答 ${ts.score} 分，產能加成 +${gain}（每日衰減型）`);
      } else {
        ts.index++; ts.answered = false; ts.selected = null;
      }
      renderOverlay();
      render();
    }
    window.nextTrainingQuestion = nextTrainingQuestion;

    function generatePipTasks(dog) {
      const tasks = [
        `完成 1 次與 ${dog.role} 有關的改善會議`,
        `提交 1 份${dog.role}改進紀錄`,
        `讓主管確認本週表現是否進步`,
        `完成 1 項跨部門協作任務`,
        `撰寫個人改善計畫書`,
      ];
      return tasks.sort(() => Math.random() - 0.5).slice(0, 3);
    }

    function startPip(index) {
      const dog = state.staff[index];
      if (!dog || dog.status === 'pip') return;
      dog.status = 'pip';
      dog.pipDaysLeft = 3; // 增加到 3 天觀察期
      dog.pipScore = 0;
      dog.pipTasks = generatePipTasks(dog).map(text => ({ text, done: false }));
      state.morale = clamp(state.morale - 4, 0, 100);
      log(`⚠️ ${dog.name} 進入 PIP 改善流程（3天觀察期），需完成改善任務。`);
      render();
    }
    function openStaffAction(index) {
      const dog = state.staff[index];
      if (!dog) return;
      state.staffActionModal = { index };
      renderOverlay();
    }
    function togglePipTask(index, taskIndex) {
      const dog = state.staff[index];
      if (!dog || dog.status !== 'pip' || !dog.pipTasks?.[taskIndex]) return;
      dog.pipTasks[taskIndex].done = !dog.pipTasks[taskIndex].done;
      renderOverlay();
      render();
    }
    function keepStaff(index) {
      const dog = state.staff[index];
      if (!dog) return;
      dog.status = 'active';
      dog.pipDaysLeft = 0; dog.pipScore = 0; dog.pipTasks = [];
      state.staffActionModal = null;
      state.morale = clamp(state.morale + 2, 0, 100);
      log(`✅ ${dog.name} 通過 PIP，決定留任。`);
      renderOverlay(); render();
    }
    function fireStaff(index) {
      const dog = state.staff[index];
      if (!dog) return;
      state.money = Math.max(0, state.money - dog.severance);
      state.morale = clamp(state.morale - 6, 0, 100);
      // 移除化學反應
      state.activeChemistry = state.activeChemistry.filter(key => !key.includes(dog.role));
      state.staff.splice(index, 1);
      const wi = walkers.findIndex(w => w.dogData && w.dogData.name === dog.name);
      if (wi >= 0) walkers.splice(wi, 1);
      state.staffActionModal = null;
      log(`${dog.name} 完成資遣，支付 $${dog.severance}。`);
      renderOverlay(); render();
    }
    window.startPip = startPip;
    window.openStaffAction = openStaffAction;
    window.keepStaff = keepStaff;
    window.fireStaff = fireStaff;

            ${interviewHtml}
            <ul class="effect-list">
              <li>工作印象：${scoreWords[0]}</li>
              <li>團隊感受：${scoreWords[1]}</li>
              <li>穩定度：${scoreWords[2]}</li>
              <li>職業特性：${dog.passive}</li>
              <li>預估成本：${dog.expectedSalary} / 日</li>
            </ul>
            <p class="small" style="margin-top:6px;font-style:italic;">${dog.note}</p>
          </div>
        </div>
      `;
      const warn = document.getElementById('capacityWarn');
      if (atCapacity()) {
        warn.innerHTML = `<div class="capacity-warn">⚠️ 辦公室已滿！先去商店擴建才能再請人。</div>`;
        document.getElementById('hireBtn').disabled = true;
      } else {
        warn.innerHTML = '';
        document.getElementById('hireBtn').disabled = false;
      }
    }

    function renderOfficeScene() {
      const lv = currentLevel();
      const wall = document.getElementById('roomWall');
      const floor = document.getElementById('roomFloor');
      wall.style.background = `linear-gradient(180deg, ${lv.wall}, #fff9f1 62%, #ffe6d5 100%)`;
      floor.style.background = state.health < 40 ? 'linear-gradient(180deg, #d7c1ac, #bfa082)' : `linear-gradient(180deg, ${lv.floor}, #d9ba94)`;
      let wallHtml = `<div style="position:absolute;inset:0;background:radial-gradient(circle at 20% 20%, rgba(255,255,255,.8), transparent 30%),radial-gradient(circle at 80% 10%, rgba(255,231,194,.7), transparent 26%);"></div>`;
      for (let i = 0; i < lv.windows; i++) wallHtml += `<div class="room-window" style="left:${120 + i * 140}px"></div>`;
      for (let i = 0; i < lv.lights; i++) wallHtml += `<div class="deco" style="left:${90 + i * 150}px;top:18px;font-size:28px;z-index:2">💡</div>`;
      wallHtml += `<div class="deco" style="right:26px;top:26px;font-size:30px;z-index:2">☁️</div>`;
      wall.innerHTML = wallHtml;

      const b = getRoomBounds();
      const desksLayer = document.getElementById('desksLayer');
      let deskHtml = '';
      for (let i = 0; i < lv.desks; i++) {
        const row = Math.floor(i / 3), col = i % 3;
        deskHtml += `<div class="desk-obj" style="left:${100 + col * 140 + (row % 2) * 60}px;top:${b.floorTop + 34 + row * 72}px"></div>`;
      }
      for (let i = 0; i < lv.shelves; i++) deskHtml += `<div class="shelf" style="left:${b.w - 140 - i * 90}px;top:${100 + i * 54}px"></div>`;
      for (let i = 0; i < lv.plants + state.decor; i++) deskHtml += `<div class="plant" style="left:${80 + (i * 128) % (b.w - 120)}px;top:${b.floorTop - 18 + (i % 2) * 8}px">🪴</div>`;
      for (let i = 0; i < lv.coffee; i++) deskHtml += `<div class="coffee" style="left:${180 + i * 160}px;top:${b.floorTop + 8 + (i % 2) * 44}px">☕</div>`;
      for (let i = 0; i < lv.lounge; i++) deskHtml += `<div class="deco" style="left:${36 + i * 72}px;top:${b.floorTop + 32 + i * 14}px;font-size:32px;z-index:2">🛋️</div>`;
      deskHtml += `<div class="deco" style="right:24px;bottom:18px;font-size:36px;z-index:2">✨</div>`;
      desksLayer.innerHTML = deskHtml;

      const decoLayer = document.getElementById('decoLayer');
      const decoItems = ['🎾','🦴','📦','🏆','🎨','🧸','📎','🧃','🌈','🪄'];
      let decoHtml = '';
      const decoCount = Math.min(state.decor * 2 + lv.shelves + lv.lounge, 12);
      for (let i = 0; i < decoCount; i++) {
        decoHtml += `<div class="deco" style="left:${94 + (i * 132) % (b.w - 110)}px;top:${b.floorTop + 8 + (i * 48) % (b.h - b.floorTop - 44)}px">${decoItems[i % decoItems.length]}</div>`;
      }
      decoLayer.innerHTML = decoHtml;

      const slot = document.getElementById('candidateSlot');
      const dog = state.current;
      if (dog) {
        const pp = state.candidatePatience;
        const bubbleText = pp <= 1 ? `${dog.name}：我快走了...` : pp === 2 ? `${dog.name}：還在考慮嗎？` : `${dog.name} 來面試！`;
        slot.innerHTML = `<div class="candidate-at-door" style="bottom:8px"><div class="cad-bubble">${bubbleText}</div><span class="cad-emoji">${dog.emoji}</span></div>`;
      } else {
        slot.innerHTML = `<div class="candidate-at-door" style="bottom:8px;opacity:0.5"><div class="cad-bubble">${state.vacancy ? '今天沒有人來...' : '等待下一位...'}</div><span class="cad-emoji">🚪</span></div>`;
      }
      document.getElementById('officeName').textContent = lv.name;
      document.getElementById('capacityInfo').textContent = `${state.staff.length} / ${lv.maxStaff} 🐕`;
      document.getElementById('officeStatus').textContent = companyStage();
      document.getElementById('officeBanner').textContent = companyHint();
    }

    function renderShop() {
      let items = SHOP_ITEMS.map(item => `
        <div class="shop-item">
          <div class="shop-top">
            <div>
              <strong>${item.name}</strong>
              <div class="small">${item.desc}</div>
              <div class="shop-stat-tags">${(item.statTags || []).map(t => `<span class="shop-stat-tag ${t.type === 'up' ? 'up' : 'down'}">${t.type === 'up' ? '▲' : '▼'} ${t.label}</span>`).join('')}</div>
            </div>
            <button class="mini" ${state.money < item.cost ? 'disabled' : ''} onclick="buyItem('${item.id}')">$${item.cost}</button>
          </div>
        </div>
      `).join('');
      const nextLv = state.officeLevel + 1;
      if (nextLv < OFFICE_LEVELS.length) {
        const next = OFFICE_LEVELS[nextLv];
        items = `
          <div class="shop-item" style="background:linear-gradient(135deg,#fff8e1,#ffe0b2);border:2px solid #ffb347;">
            <div class="shop-top">
              <div><strong>🏗️ 擴建 → ${next.name}</strong><div class="small">最大員工數 ${next.maxStaff} 隻</div></div>
              <button class="hire" ${state.money >= next.upgradeCost ? '' : 'disabled'} onclick="buyItem('upgrade')">$${next.upgradeCost}</button>
            </div>
          </div>
        ` + items;
      } else {
        items = `<div class="shop-item" style="background:#e8f5e9;"><strong>🎉 已達最大規模！</strong></div>` + items;
      }
      document.getElementById('shopList').innerHTML = items;
    }

    function renderStaff() {
      const list = document.getElementById('staffList');
      document.getElementById('staffCountBadge').textContent = state.staff.length;
      if (!state.staff.length) {
        list.innerHTML = `<div class="staff-item"><div class="small">還沒有員工狗狗。先錄用幾位看看公司會怎麼變。</div></div>`;
        return;
      }
      list.innerHTML = state.staff.map((dog, index) => {
        const gradeColor = dog.grade === 'S' ? '#ffd700' : dog.grade === 'A' ? '#4caf50' : dog.grade === 'B' ? '#2196f3' : dog.grade === 'C' ? '#ff9800' : '#f44336';
        const pipHtml = dog.status === 'pip' ? `
          <span class="staff-tag pip">PIP 中</span>
          <div class="pip-progress">
            ${Array.from({length: 3}, (_, i) => `<div class="pip-dot ${i < (3 - dog.pipDaysLeft) ? 'done' : i === (3 - dog.pipDaysLeft) ? 'current' : ''}"></div>`).join('')}
          </div>
          ${dog.pipDaysLeft === 0 ? `<span class="staff-tag ready-exit">可決定留任 / 資遣</span>` : `<span class="small">剩 ${dog.pipDaysLeft} 天</span>`}
        ` : '';
        return `
          <div class="staff-item">
            <div class="staff-top">
              <strong>${dog.emoji} ${dog.name}</strong>
              <div><span class="badge">${dog.role}</span> <span class="badge" style="background:${gradeColor};color:white;font-size:10px;">${dog.grade}</span></div>
            </div>
            <div class="small">${dog.breed}，${dog.traits.join('、')}</div>
            <div class="small">日薪 $${dog.expectedSalary}｜資遣費 $${dog.severance}</div>
            ${pipHtml}
            <div class="radar-wrap"><canvas id="radar-${index}" width="140" height="140"></canvas></div>
            <div class="staff-actions">
              <button class="mini" onclick="openStaffAction(${index})">員工處理</button>
            </div>
          </div>
        `;
      }).join('');
      // 畫五角圖
      state.staff.forEach((dog, index) => {
        setTimeout(() => drawRadar(`radar-${index}`, dog.stats), 0);
      });
    }

    function renderLog() {
      document.getElementById('log').innerHTML = state.log.map(item => `<div class="log-item">${item}</div>`).join('');
    }

    function renderOverlay() {
      const root = document.getElementById('overlayRoot');

      // Frisbee game
      if (state.miniGame && state.miniGame.type === 'frisbee') {
        const mg = state.miniGame;
        root.innerHTML = `
          <div class="overlay">
            <div class="overlay-card">
              <div class="overlay-head">
                <div><h2>🎾 飛盤接接樂</h2><p class="small">30 秒內接住飛盤和零食！⭐=3分 🥏=2分 其他=1分</p></div>
                <button class="overlay-close" onclick="closeOverlay()">提早結束</button>
              </div>
              <div class="mini-game-wrap">
                <div class="frisbee-hud"><strong>⏱ <span class="fris-timer">${mg.timeLeft.toFixed(1)}</span>s</strong><strong>🏆 <span class="fris-score">${mg.score}</span></strong></div>
                <div class="frisbee-game">
                  <div class="frisbee-dog" style="left:${mg.dogX}%">🐕</div>
                  ${mg.treats.map(item => `<div class="frisbee-disk" style="left:${item.x}%; top:${item.y}%">${item.emoji}</div>`).join('')}
                </div>
                <div class="actions" style="margin-top:0">
                  <button class="mini" onmousedown="moveMiniDog(-1)" onmouseup="stopMiniDog()" onmouseleave="stopMiniDog()" ontouchstart="moveMiniDog(-1)" ontouchend="stopMiniDog()">⬅ 左移</button>
                  <button class="mini" onmousedown="moveMiniDog(1)" onmouseup="stopMiniDog()" onmouseleave="stopMiniDog()" ontouchstart="moveMiniDog(1)" ontouchend="stopMiniDog()">右移 ➡</button>
                </div>
              </div>
            </div>
          </div>
        `;
        return;
      }

      // Memory game
      if (state.miniGame && state.miniGame.type === 'memory') {
        const mg = state.miniGame;
        root.innerHTML = `
          <div class="overlay">
            <div class="overlay-card">
              <div class="overlay-head">
                <div><h2>🃏 狗勾翻牌記憶</h2><p class="small">翻開兩張一樣的卡片配對！60 秒內完成越多越好。</p></div>
                <button class="overlay-close" onclick="closeOverlay()">結束</button>
              </div>
              <div class="frisbee-hud"><strong>⏱ <span class="mem-timer">${mg.timeLeft.toFixed(1)}</span>s</strong><strong>🎯 <span class="mem-matches">${mg.matches}</span>/8</strong><strong>步數 <span class="mem-moves">${mg.moves}</span></strong></div>
              <div class="memory-grid">
                ${mg.cards.map(c => `
                  <div class="memory-card ${c.flipped ? 'flipped' : ''} ${c.matched ? 'matched' : ''}" onclick="flipMemoryCard(${c.id})">
                    ${c.flipped || c.matched ? c.emoji : '❓'}
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
        return;
      }

      // Staff action modal
      if (state.staffActionModal) {
        const dog = state.staff[state.staffActionModal.index];
        if (!dog) { state.staffActionModal = null; root.innerHTML = ''; return; }
        const tasksDone = (dog.pipTasks || []).filter(t => t.done).length;
        const canDecide = dog.status === 'pip' && dog.pipDaysLeft === 0 && tasksDone >= 2;
        root.innerHTML = `
          <div class="overlay">
            <div class="overlay-card">
              <div class="overlay-head">
                <div><h2>🗂️ ${dog.name} 的管理</h2><p class="small">先走 PIP（3天觀察+任務），再決定留任或資遣。</p></div>
                <button class="overlay-close" onclick="closeOverlay()">關閉</button>
              </div>
              <div class="result-box">
                <strong>狀態：${dog.status === 'pip' ? `PIP 進行中（剩 ${dog.pipDaysLeft} 天）` : '正常任職'}</strong>
                <div class="small">觀察分數：${dog.pipScore}｜完成任務：${tasksDone}/${dog.pipTasks?.length || 0}｜資遣費：$${dog.severance}</div>
                <div class="small">${dog.status === 'pip'
                  ? (canDecide ? '✅ 改善期與任務完成，可以決定留任或資遣。' : '⏳ 改善期尚未結束，或任務還沒完成。')
                  : '如果表現不佳，可以啟動 PIP（3天觀察期）。'}</div>
              </div>
              ${dog.status === 'pip' ? `<div class="quiz-list">${(dog.pipTasks || []).map((task, idx) => `
                <div class="quiz-card">
                  <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
                    <span>${task.text}</span>
                    <button class="mini" onclick="togglePipTask(${state.staffActionModal.index}, ${idx})">${task.done ? '已完成 ✅' : '標記完成'}</button>
                  </div>
                </div>
              `).join('')}</div>` : ''}
              <div class="actions">
                <button class="mini" ${dog.status === 'pip' ? 'disabled' : ''} onclick="startPip(${state.staffActionModal.index})">啟動 PIP</button>
                <button class="hire" ${canDecide ? '' : 'disabled'} onclick="keepStaff(${state.staffActionModal.index})">留任</button>
              </div>
              <div class="actions">
                <button class="reject" ${canDecide ? '' : 'disabled'} onclick="fireStaff(${state.staffActionModal.index})">資遣 $${dog.severance}</button>
                <button class="mini" onclick="closeOverlay()">先不處理</button>
              </div>
            </div>
          </div>
        `;
        return;
      }

      // Training quiz
      if (state.trainingSession) {
        const ts = state.trainingSession;
        if (ts.finished) {
          root.innerHTML = `
            <div class="overlay"><div class="overlay-card">
              <div class="overlay-head"><div><h2>📚 培訓完成</h2><p class="small">問答決定產能加成，每日結算後衰減。</p></div>
                <button class="overlay-close" onclick="closeOverlay()">關閉</button></div>
              <div class="result-box"><strong>獎勵：+${ts.reward} 產能加成</strong><div class="small">此加成會每天衰減，不會永久疊加。</div></div>
            </div></div>
          `;
          return;
        }
        const q = ts.questions[ts.index];
        root.innerHTML = `
          <div class="overlay"><div class="overlay-card">
            <div class="overlay-head">
              <div><h2>🧠 培訓問答</h2><p class="small">共 ${ts.questions.length} 題，答得越好加成越高。</p></div>
              <div class="badge">第 ${ts.index + 1} / ${ts.questions.length} 題</div>
            </div>
            <div class="quiz-card"><strong>${q.q}</strong>
              <div class="quiz-options">
                ${q.options.map((opt, idx) => {
                  const cls = ts.answered ? (idx === q.answer ? 'correct' : idx === ts.selected ? 'wrong' : '') : '';
                  return `<button class="${cls}" ${ts.answered ? 'disabled' : ''} onclick="answerTraining(${idx})">${opt}</button>`;
                }).join('')}
              </div>
            </div>
            <div class="actions">
              <button class="mini" disabled>目前分數：${ts.score}</button>
              <button class="hire" ${ts.answered ? '' : 'disabled'} onclick="nextTrainingQuestion()">${ts.index === ts.questions.length - 1 ? '完成培訓' : '下一題'}</button>
            </div>
          </div></div>
        `;
        return;
      }
      root.innerHTML = '';
    }

    function renderSplash() {
      const root = document.getElementById('splashRoot');
      if (!state.showSplash) { root.innerHTML = ''; return; }
      root.innerHTML = `
        <div class="splash-screen">
          <div class="splash-card">
            <div class="splash-art"></div>
            <div class="splash-fallback">
              <div class="splash-bubbles"><span></span><span></span><span></span><span></span></div>
              <div style="font-size:88px;">🐶💼☁️</div>
            </div>
            <div class="splash-content">
              <div class="splash-title">狗狗公司</div>
              <div class="splash-sub">從一間可愛的小公司開始，招募狗狗夥伴、培養團隊、把辦公室經營成最夢幻的職場。</div>
              <button class="start-btn" onclick="startGame()">Start</button>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.bankrupt) return;
      ensureQueue();
      document.getElementById('dayLabel').textContent = `第 ${state.day} 天`;
      document.getElementById('money').textContent = `$${state.money}`;
      document.getElementById('staffCount').textContent = `${state.staff.length}/${maxStaff()}`;
      document.getElementById('moraleText').textContent = textLevel(state.morale, ['超嗨','穩定','低迷']);
      document.getElementById('healthText').textContent = textLevel(state.health, ['順暢','普通','混亂']);
      document.getElementById('moraleBar').style.width = `${state.morale}%`;
      document.getElementById('healthBar').style.width = `${state.health}%`;
      document.getElementById('statusBadge').textContent = companyStage();
      const roleSummary = [...new Set(state.staff.map(d => d.role))].slice(0, 5).join('、') || '目前還沒有職業組合';
      const chemSummary = state.activeChemistry.length ? `｜化學反應：${state.activeChemistry.join(', ')}` : '';
      document.getElementById('economyHint').textContent = `營運提示：${companyHint()}｜培訓加成 +${state.trainingBoost}｜陣容：${roleSummary}${chemSummary}`;
      renderResume();
      renderOfficeScene();
      renderShop();
      renderStaff();
      renderLog();
      renderOverlay();
      renderTutorial();
      renderSplash();
    }

    document.getElementById('hireBtn').addEventListener('click', hireCurrent);
    document.getElementById('rejectBtn').addEventListener('click', rejectCurrent);
    document.getElementById('playBtn').addEventListener('click', openPlayMiniGame);
    document.getElementById('trainBtn').addEventListener('click', openTrainingQuiz);

    function handleMiniGameKeyDown(e) {
      if (!state.miniGame) return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); state.miniGame.moveDir = -1; }
      else if (e.key === 'ArrowRight') { e.preventDefault(); state.miniGame.moveDir = 1; }
    }
    function handleMiniGameKeyUp(e) {
      if (!state.miniGame) return;
      if (e.key === 'ArrowLeft' && state.miniGame.moveDir < 0) { e.preventDefault(); state.miniGame.moveDir = 0; }
      else if (e.key === 'ArrowRight' && state.miniGame.moveDir > 0) { e.preventDefault(); state.miniGame.moveDir = 0; }
    }
    window.addEventListener('keydown', handleMiniGameKeyDown);
    window.addEventListener('keyup', handleMiniGameKeyUp);

    render();
  </script>
</body>
</html>
